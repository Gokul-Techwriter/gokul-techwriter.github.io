<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gokul S Anand — Technical Writer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Raleway', sans-serif;
    background: #f5f0e8;
    min-height: 100vh;
  }

  .banner-wrap {
    width: 100%;
    overflow: hidden;
    border-radius: 0 0 2rem 2rem;
    line-height: 0;
  }

  .banner {
    width: 100%;
    height: auto;
    display: block;
    image-rendering: high-quality;
  }

  main {
    padding: 3rem 4rem 2.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }

  .card {
    position: relative;
    border-radius: 0.5rem;
    overflow: hidden;
    aspect-ratio: 3/4;
    border: 3px solid #6aaba5;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 24px 48px rgba(74,139,133,0.3);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.4s ease;
  }

  .card:hover .card-bg { transform: scale(1.06); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(30, 60, 55, 0.38);
    transition: background 0.3s ease;
  }

  .card:hover .card-overlay { background: rgba(30, 60, 55, 0.52); }

  .card-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: white;
    text-align: center;
    padding: 1rem;
  }

  .card-label .icon {
    font-size: 1.6rem;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  .card-label .text {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    font-weight: 600;
  }

  .social {
    text-align: center;
    padding-top: 1.2rem;
    border-top: 1px solid rgba(74,139,133,0.25);
  }

  .social a {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    color: #3a6e69;
    text-decoration: none;
    text-transform: uppercase;
    padding: 0 1.2rem;
    transition: color 0.2s;
    font-weight: 700;
  }

  .social a:hover { color: #4a8b85; }
  .social .sep { color: #6aaba5; font-size: 1.1rem; }

  @media (max-width: 768px) {
    main { padding: 2rem 1rem 1.5rem; }
    .cards { grid-template-columns: 1fr; gap: 1rem; }
    .card { aspect-ratio: 4/3; }
  }
</style>
</head>
<body>

<div class="banner-wrap">
  <img class="banner" src="images/top-banner.png" alt="Gokul S Anand — Technical Writer">

<main>
  <div class="cards">
    <a class="card" href="portfolio">
      <div class="card-bg" style="background-image: url('images/about-me.png')"></div>
      <div class="card-overlay"></div>
      <div class="card-label">
        <span class="icon">📂</span>
        <span class="text">View Portfolio</span>
      </div>
    </a>

    <a class="card" href="about">
      <div class="card-bg" style="background-image: url('images/about-me.png')"></div>
      <div class="card-overlay"></div>
      <div class="card-label">
        <span class="icon">👤</span>
        <span class="text">About Me</span>
      </div>
    </a>

    <a class="card" href="contact">
      <div class="card-bg" style="background-image: url('images/contact.png')"></div>
      <div class="card-overlay"></div>
      <div class="card-label">
        <span class="icon">✉️</span>
        <span class="text">Contact</span>
      </div>
    </a>
  </div>

  <div class="social">
    <a href="https://linkedin.com/in/gokul-s-anand" target="_blank">LinkedIn</a>
    <span class="sep">•</span>
    <a href="https://github.com/Gokul-Techwriter/technical-writing-portfolio" target="_blank">GitHub</a>
  </div>
</main>

</body>
</html>
